name: Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0) — will create tag v{version}'
        required: true
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building release ${TAG} (version ${VERSION})"

      - name: Verify version matches package.json
        working-directory: electron
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "::warning::package.json version (${PKG_VERSION}) does not match release version (${EXPECTED})"
          fi

      - name: Create tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac
          - os: ubuntu-latest
            build_cmd: npm run build:linux
          - os: windows-latest
            build_cmd: npm run build:win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: electron
        run: npm ci

      - name: Build
        working-directory: electron
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
            electron/dist/*.exe
            electron/dist/*.AppImage
            electron/dist/*.deb
            electron/dist/latest-mac.yml
            electron/dist/latest-linux.yml
            electron/dist/latest.yml

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: List release files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: PeopleSafe SDLC Journal ${{ needs.prepare.outputs.tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true' }}
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS | `.dmg` (installer) or `.zip` (portable) |
            | Windows | `.exe` (installer) |
            | Linux | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |

            ### First time?
            Download the file for your platform, install, and open. Your journal data is encrypted and stored locally — nothing is sent to any server.

            ### Updating?
            The app checks for updates automatically. You can also use **Help > Check for Updates** from the menu bar.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
