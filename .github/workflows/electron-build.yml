name: Build Electron App

on:
  push:
    branches: [main]
    paths:
      - 'electron/**'
      - 'js/**'
      - 'css/**'
      - 'index.html'
      - 'assets/**'
  pull_request:
    branches: [main]
    paths:
      - 'electron/**'
      - 'js/**'
      - 'css/**'
      - 'index.html'
      - 'assets/**'

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac
          - os: ubuntu-latest
            build_cmd: npm run build:linux
          - os: windows-latest
            build_cmd: npm run build:win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: electron
        run: npm ci

      - name: Build
        working-directory: electron
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
            electron/dist/*.exe
            electron/dist/*.AppImage
            electron/dist/*.deb
            electron/dist/latest-mac.yml
            electron/dist/latest-linux.yml
            electron/dist/latest.yml
